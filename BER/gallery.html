<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Beautiful Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:linear-gradient(135deg,#ff6b9d,#ffc2d1,#ffe5ec);

    overflow-x:hidden;

    color:white;

}

/* Floating Hearts */

.hearts span{

    position:fixed;
    bottom:-80px;
    font-size:25px;
    animation:float 9s linear infinite;
    opacity:.7;

}

.hearts span:nth-child(1){left:10%;animation-delay:0s;}
.hearts span:nth-child(2){left:30%;animation-delay:2s;}
.hearts span:nth-child(3){left:50%;animation-delay:4s;}
.hearts span:nth-child(4){left:70%;animation-delay:1s;}
.hearts span:nth-child(5){left:90%;animation-delay:3s;}

@keyframes float{

0%{
transform:translateY(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

.container{

    padding:25px 18px 40px;

}

h1{

    text-align:center;

    font-family:'Great Vibes',cursive;

    font-size:55px;

    margin-top:20px;

}

.subtitle{

    text-align:center;

    margin:15px 0 35px;

    font-size:18px;

}

.gallery{

    display:grid;

    grid-template-columns:1fr;

    gap:25px;

}

.card{

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(15px);

    border-radius:25px;

    overflow:hidden;

    box-shadow:0 12px 30px rgba(0,0,0,.2);

    transition:.3s;

}

.card:hover{

    transform:translateY(-5px);

}

.card img{

    width:100%;

    height:320px;

    object-fit:cover;

}

.caption{

    padding:18px;

    text-align:center;

    font-size:16px;

}

button{

    width:100%;

    margin-top:40px;

    padding:18px;

    border:none;

    border-radius:50px;

    background:white;

    color:#ff4d88;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

@media(min-width:768px){

.gallery{

grid-template-columns:repeat(2,1fr);

}

}

</style>

</head>

<body>

<div class="hearts">
<span>❤️</span>
<span>💕</span>
<span>💖</span>
<span>💗</span>
<span>❤️</span>
</div>

<div class="container">

<h1>Our Memories ❤️</h1>

<p class="subtitle">

Every picture tells a story...
Every smile reminds me why I love you.

</p>

<div class="gallery">

<div class="card">

<img src="images/ber1.jpeg" alt="">

<div class="caption">

❤️ The day that made my heart smile.

</div>

</div>

<div class="card">

<img src="images/ber2.jpeg" alt="">

<div class="caption">

🌹 One of my favourite moments with you.

</div>

</div>

<div class="card">

<img src="images/ber3.jpeg" alt="">

<div class="caption">

🥹 You make every day brighter.

</div>

</div>

<div class="card">

<img src="images/ber4.jpeg" alt="">

<div class="caption">

💖 Thank you for making life beautiful.

</div>

</div>

<div class="card">

<img src="images/ber5.jpeg" alt="">

<div class="caption">

✨ More adventures together.

</div>

</div>

<div class="card">

<img src="images/ber3.jpeg" alt="">

<div class="caption">

❤️ My favourite person.

</div>

</div>

</div>

<button onclick="location.href='video.html'">

Continue ❤️

</button>

</div>

</body>
</html>
