<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Akobabe ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff6b9d,#ffc2d1,#ffe5ec);
            padding:20px;
        }

        .card{
            width:100%;
            max-width:360px;
            background:rgba(255,255,255,.2);
            backdrop-filter:blur(12px);
            border-radius:25px;
            padding:35px 25px;
            text-align:center;
            color:white;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        h1{
            font-family:'Great Vibes',cursive;
            font-size:50px;
            margin-bottom:10px;
        }

        h2{
            font-size:28px;
            margin-bottom:20px;
        }

        p{
            line-height:1.8;
            margin-bottom:30px;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:40px;
            background:white;
            color:#ff4d88;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            transform:scale(1.03);
        }
    </style>

</head>
<body>

<div class="card">

    <h1>Happy Birthday</h1>

    <h2>Akobabe ❤️</h2>

    <p>
        Today is your special day.<br>
        I created something beautiful just for you.
    </p>

    <button onclick="location.href='letter.html'">
        Open My Surprise ❤️
    </button>

</div>

</body>
</html>
